name: CI
on:
  push:
    branches: [main]
    # tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Run Rust tests
        # `--all-targets` also executes Criterion/CodSpeed benchmark binaries.
        # Those have their own CodSpeed workflow; keep this job focused on
        # unit, integration, and binary tests.
        run: cargo nextest run --workspace
      - name: Check Python feature
        run: cargo check -p inlier --features python --lib
      - name: Run doctests
        run: cargo test --doc --workspace
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Fetch Python test data package
        run: git clone --depth 1 https://github.com/soraxas/inlier-data ../inlier-data
      - name: Run Python tests
        run: |
          uv run --no-project --with maturin maturin develop --release -F python --skip-install
          PYTHONPATH=python uv run --no-project --with pytest --with numpy --with-editable ../inlier-data pytest tests/python

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Collect coverage data
        run: |
          cargo llvm-cov --no-report nextest --workspace
          cargo llvm-cov --no-report --doc --workspace
          cargo llvm-cov report --doctests --lcov --output-path lcov.info
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>inlier gallery</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
      canvas { display: block; width: 100%; height: 100%; outline: none; }
    </style>
    <!-- Build this crate to wasm. trunk runs wasm-opt only for --release,
         so debug (`trunk serve`) rebuilds stay fast automatically. -->
    <link data-trunk rel="rust" data-bin="inlier-gallery" />
    <!-- Bundle the sample point cloud so the voxel-plane demo can fetch it
         at /SALON.ply (the browser has no filesystem for the Load button). -->
    <link data-trunk rel="copy-file" href="../../SALON.ply" />
  </head>
  <body>
    <canvas id="bevy"></canvas>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>inlier gallery (threads)</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
      canvas { display: block; width: 100%; height: 100%; outline: none; }
    </style>
    <!-- Multicore build: `threads` cargo feature + wasm-bindgen-rayon. The
         atomics/build-std/nightly toolchain is supplied by `just wasm-dev-threads`
         via env vars (RUSTFLAGS / CARGO_UNSTABLE_BUILD_STD / RUSTUP_TOOLCHAIN),
         NOT via .cargo/config.toml — so the stable index.html build stays scalar. -->
    <link data-trunk rel="rust" data-bin="inlier-gallery"
          data-cargo-features="threads" data-initializer="threads-init.mjs" />
    <link data-trunk rel="copy-file" href="../../SALON.ply" />
  </head>
  <body>
    <canvas id="bevy"></canvas>
  </body>
</html>
